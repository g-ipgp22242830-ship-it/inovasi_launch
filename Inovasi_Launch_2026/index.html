<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPGKI 2026 - Majlis Perasmian</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Times New Roman', serif; }
        #main-ui { 
            position: relative; width: 100vw; height: 100vh; 
            background: url('signature.png') no-repeat center center; 
            background-size: 100% 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        /* 关键：确保签名区域不仅位置正确，而且在最顶层 */
        #sign-wrapper {
            position: absolute; top: 54%; left: 50%; transform: translate(-50%, -50%);
            width: 48vw; height: 28vh; z-index: 999; background: rgba(255,255,255,0.01); /* 微小的透明背景能捕获触摸事件 */
        }
        #paintCanvas { width: 100%; height: 100%; touch-action: none; display: block; }
        .launch-btn {
            position: absolute; bottom: 12%; right: 7.5%;
            width: 12vw; height: 12vw; max-width: 150px; max-height: 150px;
            background: transparent; border: none; border-radius: 50%;
            cursor: pointer; z-index: 1000;
        }
        #video-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10001; }
        #video-layer video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="sign-wrapper">
        <canvas id="paintCanvas"></canvas>
    </div>
    <button class="launch-btn" onclick="triggerLaunch()"></button>
</div>

<div id="video-layer">
    <video id="launchVideo" src="launchvideo full.mp4" playsinline preload="auto"></video>
</div>

<script>
    // 1. 初始化 PubNub
    const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', userId: "user_" + Math.random() });
    const channel = 'ipgki_grand_matrix_v1';
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    
    // 角色判定：URL 包含 ?role=tablet 才是签名端
    const isTablet = new URLSearchParams(window.location.search).get('role') === 'tablet';

    function setupCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = '#0a1a3a'; ctx.lineWidth = 5;
    }
    
    window.onload = setupCanvas;
    window.onresize = setupCanvas;

    let allStrokes = [], currentPoints = [];

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        allStrokes.forEach(stroke => {
            if (stroke.length < 2) return;
            ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
            stroke.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        });
        if (currentPoints.length > 1) {
            ctx.beginPath(); ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
            currentPoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
        }
    }

    // 平板端的触摸逻辑
    if (isTablet) {
        canvas.addEventListener('pointerdown', e => {
            const r = canvas.getBoundingClientRect();
            const p = { x: e.clientX - r.left, y: e.clientY - r.top };
            currentPoints = [p];
            pubnub.publish({ channel, message: { a: 's', x: p.x/r.width, y: p.y/r.height } });
        });
        canvas.addEventListener('pointermove', e => {
            if (e.buttons !== 1) return;
            const r = canvas.getBoundingClientRect();
            const p = { x: e.clientX - r.left, y: e.clientY - r.top };
            currentPoints.push(p); redraw();
            pubnub.publish({ channel, message: { a: 'm', x: p.x/r.width, y: p.y/r.height } });
        });
        window.addEventListener('pointerup', () => {
            if (currentPoints.length > 0) { allStrokes.push([...currentPoints]); currentPoints = []; }
            pubnub.publish({ channel, message: { a: 'e' } });
        });
    }

    // 接收端（电脑端）逻辑
    pubnub.subscribe({ channels: [channel] });
    pubnub.addListener({ message: m => {
        const d = m.message;
        const r = canvas.getBoundingClientRect();
        if(!isTablet) {
            if(d.a === 's') currentPoints = [{ x: d.x * r.width, y: d.y * r.height }];
            else if(d.a === 'm') { currentPoints.push({ x: d.x * r.width, y: d.y * r.height }); redraw(); }
            else if(d.a === 'e') { if(currentPoints.length>0)allStrokes.push([...currentPoints]); currentPoints=[]; }
            else if(d.a === 'l') executeGrandLaunch();
        } else if(d.a === 'l') { 
            gsap.to("body", { opacity: 0, duration: 1 }); // 平板端点击后变黑，提示仪式开始
        }
    }});

    function triggerLaunch() { pubnub.publish({ channel, message: { a: 'l' } }); }

    function executeGrandLaunch() {
        const v = document.getElementById('launchVideo');
        gsap.to("#main-ui", { opacity: 0, duration: 1, onComplete: () => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('video-layer').style.display = 'block';
            v.play();
        }});
    }
</script>
</body>
</html>
