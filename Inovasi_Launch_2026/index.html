<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPGKI 2026</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: serif; }
        #main-ui { 
            position: relative; width: 100vw; height: 100vh; 
            background: url('signature.png') no-repeat center center; 
            background-size: 100% 100%; display: flex; align-items: center; justify-content: center;
        }
        /* 签名画板容器：确保在最上层且能接收触摸 */
        #sign-wrapper {
            position: absolute; top: 54%; left: 50%; transform: translate(-50%, -50%);
            width: 48vw; height: 28vh; z-index: 100; touch-action: none;
        }
        canvas#paintCanvas { width: 100%; height: 100%; display: block; }
        
        .launch-btn {
            position: absolute; bottom: 12%; right: 7.5%;
            width: 12vw; height: 12vw; max-width: 150px; max-height: 150px;
            background: transparent; border: none; border-radius: 50%;
            cursor: pointer; z-index: 200;
        }

        #video-layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        #video-layer video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="sign-wrapper"><canvas id="paintCanvas"></canvas></div>
    <button class="launch-btn" onclick="triggerLaunch()"></button>
</div>

<div id="video-layer">
    <video id="launchVideo" src="launchvideo full.mp4" playsinline preload="auto"></video>
</div>

<script>
    const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', userId: "ipgki_" + Math.random() });
    const channel = 'ipgki_grand_matrix_v1';
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const isTablet = new URLSearchParams(window.location.search).get('role') === 'tablet';

    function setup() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.strokeStyle = '#0a1a3a'; ctx.lineWidth = 5; 
    }
    window.onload = setup;
    window.onresize = setup;

    let allStrokes = [], currentPoints = [];

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        allStrokes.forEach(s => drawPath(s));
        if(currentPoints.length > 0) drawPath(currentPoints);
    }

    function drawPath(p) {
        if (p.length < 2) return;
        ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y);
        for (let i = 1; i < p.length; i++) ctx.lineTo(p[i].x, p[i].y);
        ctx.stroke();
    }

    // 只有带 ?role=tablet 的设备可以写
    if (isTablet) {
        canvas.addEventListener('pointerdown', e => {
            const r = canvas.getBoundingClientRect();
            const p = {x: e.clientX - r.left, y: e.clientY - r.top};
            currentPoints = [p];
            pubnub.publish({ channel, message: { a: 's', x: p.x/r.width, y: p.y/r.height } });
        });
        canvas.addEventListener('pointermove', e => {
            if (e.buttons !== 1) return;
            const r = canvas.getBoundingClientRect();
            const p = {x: e.clientX - r.left, y: e.clientY - r.top};
            currentPoints.push(p); redraw();
            pubnub.publish({ channel, message: { a: 'm', x: p.x/r.width, y: p.y/r.height } });
        });
        window.addEventListener('pointerup', () => {
            if (currentPoints.length > 0) { allStrokes.push([...currentPoints]); currentPoints = []; }
            pubnub.publish({ channel, message: { a: 'e' } });
        });
    }

    pubnub.subscribe({ channels: [channel] });
    pubnub.addListener({ message: m => {
        const d = m.message;
        const r = canvas.getBoundingClientRect();
        
        // 逻辑：收到签名信号则画图，收到启动信号 'l' 则同步播放视频
        if(d.a === 's' && !isTablet) { currentPoints = [{x: d.x*r.width, y: d.y*r.height}]; }
        else if(d.a === 'm' && !isTablet) { currentPoints.push({x: d.x*r.width, y: d.y*r.height}); redraw(); }
        else if(d.a === 'e' && !isTablet) { if(currentPoints.length>0)allStrokes.push([...currentPoints]); currentPoints=[]; }
        else if(d.a === 'l') { 
            // 关键：两端都执行播放视频
            executeGrandLaunch(); 
        }
    }});

    function triggerLaunch() { pubnub.publish({ channel, message: { a: 'l' } }); }

    function executeGrandLaunch() {
        const v = document.getElementById('launchVideo');
        gsap.to("#main-ui", { opacity: 0, duration: 1, onComplete: () => {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('video-layer').style.display = 'block';
            // 如果是平板，建议静音播放视频，避免和大屏幕声音冲突（也可以不静音）
            if(isTablet) v.muted = true; 
            v.play();
        }});
    }
</script>
</body>
</html>
